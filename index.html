<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Developer Portfolio Contact</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;900&display=swap" rel="stylesheet">

<style>
/* --- Portfolio Design Tokens --- */
:root {
  --bg: #0a0f1c;
  --card: #121b2f;
  --accent: orangered;
  --text: #ffffff;
  --muted: #9ca3af;
  
  /* Additional Premium Variables */
  --accent-glow: rgba(255, 69, 0, 0.35);
  --glass-border: rgba(255, 255, 255, 0.05);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Montserrat', sans-serif;
  min-height: 100vh;
  background-color: var(--bg);
  /* Immersive Deep Tech Mesh Background */
  background-image: 
    radial-gradient(circle at 0% 0%, rgba(255, 69, 0, 0.08) 0%, transparent 50%),
    radial-gradient(circle at 100% 100%, rgba(18, 27, 47, 0.9) 0%, transparent 60%),
    linear-gradient(rgba(255, 255, 255, 0.003) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255, 255, 255, 0.003) 1px, transparent 1px);
  background-size: 100% 100%, 100% 100%, 40px 40px, 40px 40px;
  display: flex;
  justify-content: center;
  align-items: center;
  color: var(--text);
  overflow-x: hidden;
  padding: 40px 20px;
}

.contact-section {
  width: min(1200px, 100%);
  position: relative;
}

.title {
  font-size: 3rem;
  margin-bottom: 50px;
  font-weight: 900;
  letter-spacing: -1px;
  text-transform: uppercase;
  background: linear-gradient(135deg, var(--text) 30%, var(--muted));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* 3D Perspective Workspace Enclosure */
.wrapper {
  display: flex;
  align-items: center;
  justify-content: space-between;
  perspective: 1500px;
  position: relative;
  gap: 0;
  width: 100%;
}

/* --- Interactive 3D Card Module --- */
.card {
  flex: 0 0 380px;
  min-height: 460px;
  position: relative;
  z-index: 10;
  border-radius: 24px;
  overflow: hidden;
  background: var(--card);
  border: 1px solid var(--glass-border);
  box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
  transform-style: preserve-3d;
  transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.5s;
}

/* Premium Light Reflection Flare */
.card::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.05), transparent 60%);
  pointer-events: none;
}

/* Cinematic 3D Rotational Shift when Active */
.card.active {
  transform: rotateY(18deg) translateZ(20px);
  box-shadow: -20px 40px 80px rgba(0, 0, 0, 0.6), 10px 0 30px rgba(255, 69, 0, 0.1);
  border-right: 1px solid rgba(255, 69, 0, 0.3);
}

.card-content {
  padding: 45px 35px;
  display: flex;
  flex-direction: column;
  height: 100%;
  min-height: 460px;
}

.card h2 {
  font-size: 1.9rem;
  margin-bottom: 20px;
  font-weight: 700;
  line-height: 1.3;
}

.card p {
  color: var(--muted);
  font-size: 0.95rem;
  line-height: 1.7;
}

/* --- Dynamic Meta Toggles --- */
.contact-info {
  margin-top: 35px;
  max-height: 0;
  opacity: 0;
  transform: translateY(-15px) scale(0.95);
  transition: max-height 0.5s ease, opacity 0.5s ease, transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.card.active .contact-info {
  max-height: 220px;
  opacity: 1;
  transform: translateY(0) scale(1);
}

.info-item {
  display: flex;
  align-items: center;
  gap: 15px;
  color: var(--text);
  font-size: 0.95rem;
  font-weight: 400;
}

.info-item .icon {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 32px;
  height: 32px;
  background: rgba(255, 69, 0, 0.1);
  border-radius: 8px;
  color: var(--accent);
  font-size: 0.9rem;
}

/* --- Magnetic Action Control Button --- */
.btn {
  margin-top: auto;
  align-self: flex-start;
  padding: 15px 35px;
  border: 1px solid rgba(255, 69, 0, 0.4);
  border-radius: 12px;
  background: transparent;
  color: var(--text);
  font-weight: 700;
  font-size: 0.9rem;
  letter-spacing: 0.5px;
  cursor: pointer;
  position: relative;
  z-index: 1;
  overflow: hidden;
  transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
}

.btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--accent);
  z-index: -1;
  transform: translateY(101%);
  transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
}

/* Hover Fill Up Animations */
.btn:hover::before {
  transform: translateY(0);
}

.btn:hover {
  box-shadow: 0 8px 25px var(--accent-glow);
  border-color: var(--accent);
}

/* Toggled State Style rules */
.btn.toggled {
  background: var(--accent);
  border-color: var(--accent);
  box-shadow: 0 0 25px var(--accent-glow);
}
.btn.toggled::before {
  transform: translateY(0);
  background: #ff3300;
}

/* --- The Live Energy Beam Link Line --- */
.portal-line {
  flex: 1;
  height: 2px;
  background: linear-gradient(90deg, var(--accent), var(--text), transparent);
  opacity: 0;
  transform: scaleX(0);
  transform-origin: left;
  position: relative;
  z-index: 1;
}

/* Moving Light Photon laser pulse overlay */
.portal-line::after {
  content: '';
  position: absolute;
  top: 50%;
  left: 0;
  width: 40px;
  height: 6px;
  background: #fff;
  border-radius: 50%;
  transform: translateY(-50%);
  filter: blur(2px);
  box-shadow: 0 0 10px #fff, 0 0 20px var(--accent);
}

.portal-line.active {
  opacity: 1;
  transform: scaleX(1);
  transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.3s;
}

/* Laser pulse firing loop execution */
.portal-line.active::after {
  animation: photonPulse 1.5s infinite linear;
}

@keyframes photonPulse {
  0% { left: 0%; opacity: 1; }
  80% { opacity: 1; }
  100% { left: 100%; opacity: 0; }
}

/* --- Holographic Contact Form Space --- */
.form-box {
  flex: 0 0 0px;
  opacity: 0;
  overflow: hidden;
  transform: rotateY(-15px) translateZ(-50px) translateX(40px);
  transform-origin: right center;
  transition: flex 0.8s cubic-bezier(0.16, 1, 0.3, 1), 
              opacity 0.6s ease, 
              transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
}

.form-box.active {
  flex: 0 0 580px;
  opacity: 1;
  transform: rotateY(-4px) translateZ(0) translateX(0);
}

.form {
  padding: 45px;
  border-radius: 24px;
  background: var(--card);
  border: 1px solid var(--glass-border);
  box-shadow: 20px 30px 60px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255,255,255,0.05);
}

.code-line {
  font-family: 'Courier New', Courier, monospace;
  color: var(--accent);
  margin-bottom: 30px;
  font-size: 0.95rem;
  font-weight: 600;
  letter-spacing: 0.5px;
  min-height: 22px;
}

/* --- Alternating Stagger Transitions --- */
.field {
  opacity: 0;
  transition: opacity 0.5s cubic-bezier(0.16, 1, 0.3, 1), 
              transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
}

/* Slide up into frame */
.field.show {
  opacity: 1;
  transform: translate(0) !important;
}

input,
textarea {
  width: 100%;
  padding: 16px 18px;
  border: 1px solid var(--glass-border);
  outline: none;
  border-radius: 12px;
  background: rgba(10, 15, 28, 0.7);
  color: var(--text);
  font-family: 'Montserrat', sans-serif;
  font-size: 0.9rem;
  transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
}

input:focus,
textarea:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 4px var(--accent-glow);
  background: rgba(10, 15, 28, 0.95);
}

textarea {
  height: 120px;
  resize: none;
}

.submit {
  width: 100%;
  padding: 16px;
  border: none;
  border-radius: 12px;
  background: var(--accent);
  color: var(--text);
  cursor: pointer;
  font-weight: 700;
  font-size: 0.95rem;
  letter-spacing: 0.5px;
  box-shadow: 0 4px 15px var(--accent-glow);
  transition: all 0.3s;
}

.submit:hover {
  box-shadow: 0 6px 22px rgba(255, 69, 0, 0.5);
  transform: translateY(-2px);
  filter: brightness(1.1);
}

/* --- High Performance Mobile Adjustments --- */
@media(max-width: 992px) {
  .wrapper {
    flex-direction: column;
    gap: 40px;
  }
  
  .card, .form-box.active {
    flex: 0 0 auto;
    width: 100%;
    transform: none !important;
  }
  
  .portal-line {
    display: none !important;
  }
  
  .form-box {
    transform: translateY(40px);
  }
  
  .title {
    font-size: 2.3rem;
    text-align: center;
  }
}
</style>
</head>

<body>

<section class="contact-section">
  <h1 class="title">Get In Touch</h1>

  <div class="wrapper">
    <div class="card" id="card">
      <div class="card-content">
        <h2>Let's Build Something Great</h2>
        <p>Available for freelance contracts, full-stack application development architectures, and creative UI engineering.</p>
        
        <div class="contact-info">
          <div class="info-item"><div class="icon">📞</div> +234 800 000 0000</div>
          <div class="info-item"><div class="icon">📧</div> ayo@example.com</div>
          <div class="info-item"><div class="icon">📍</div> Lagos, Nigeria</div>
        </div>
        
        <button class="btn" id="btn">Contact Me</button>
      </div>
    </div>

    <div class="portal-line" id="line"></div>

    <div class="form-box" id="formBox">
      <div class="form">
        <div class="code-line" id="typing"></div>
        
        <div class="field" style="transform: translateX(-30px);">
          <input type="text" placeholder="Your Name" required>
        </div>
        <div class="field" style="transform: translateX(30px);">
          <input type="email" placeholder="Your Email" required>
        </div>
        <div class="field" style="transform: translateX(-30px);">
          <input type="text" placeholder="Subject">
        </div>
        <div class="field" style="transform: translateY(20px);">
          <textarea placeholder="Your Message" required></textarea>
        </div>
        <div class="field" style="transform: translateY(15px);">
          <button class="submit">Send Message</button>
        </div>
      </div>
    </div>
  </div>
</section>

<script>
const btn = document.getElementById("btn");
const card = document.getElementById("card");
const line = document.getElementById("line");
const formBox = document.getElementById("formBox");
const typing = document.getElementById("typing");
const fields = document.querySelectorAll(".field");

let isOpen = false;
let typeInterval = null;

btn.addEventListener("click", () => {
  if (!isOpen) {
    // --- OPEN SEQUENCE ---
    isOpen = true;
    btn.classList.add("toggled");
    btn.textContent = "Close Panel";
    card.classList.add("active");
    
    setTimeout(() => {
      line.classList.add("active");
    }, 150);
    
    setTimeout(() => {
      formBox.classList.add("active");
      startTyping();
    }, 550);

  } else {
    // --- CLOSE/RESET SEQUENCE ---
    isOpen = false;
    btn.classList.remove("toggled");
    btn.textContent = "Contact Me";
    
    // 1. Instantly drop fields down
    fields.forEach(el => el.classList.remove("show"));
    
    // 2. Kill current typing animation if midway running
    clearInterval(typeInterval);
    typing.textContent = "";
    
    // 3. Close up structural frames
    setTimeout(() => {
      formBox.classList.remove("active");
    }, 200);
    
    setTimeout(() => {
      line.classList.remove("active");
    }, 400);
    
    setTimeout(() => {
      card.classList.remove("active");
    }, 600);
  }
});

function startTyping() {
  const text = "const initialized = new ContactForm();";
  let i = 0;
  typing.textContent = "";
  
  clearInterval(typeInterval); // Guard assertion
  
  typeInterval = setInterval(() => {
    typing.textContent = text.slice(0, i) + "┃";
    i++;
    
    if (i > text.length) {
      clearInterval(typeInterval);
      typing.textContent = text; // Lock text without flashing line
      
      // Reveal input fields seamlessly with dynamic stagger offsets
      fields.forEach((el, index) => {
        setTimeout(() => {
          if(isOpen) el.classList.add("show"); // Verify module state hasn't changed
        }, index * 80);
      });
    }
  }, 25);
}
</script>

</body>
</html>
